<div class="page-container">
  <header class="section-header">
    <div class="title-group">
      <h1>Detalle de Pesaje Seleccionado</h1>
      <p>No. de Cuenta: <strong>{{ noDeCuentaAsociado }}</strong></p>
    </div>
    <div class="action-buttons">
      <button mat-button routerLink="/" class="back-btn">
        <mat-icon>arrow_back</mat-icon> Regresar
      </button>
      <button mat-raised-button class="add-btn" routerLink="/parcialidades/nueva">
        <mat-icon>add</mat-icon> Nueva Parcialidad
      </button>
    </div>
  </header>

  <mat-card class="table-card">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSourceParcialidades" class="custom-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID de Parcialidad </th>
          <td mat-cell *matCellDef="let row"> {{row.id}} </td>
        </ng-container>

        <ng-container matColumnDef="placa">
          <th mat-header-cell *matHeaderCellDef> Placa Transporte </th>
          <td mat-cell *matCellDef="let row"> {{row.placa}} </td>
        </ng-container>

        <ng-container matColumnDef="transportista">
          <th mat-header-cell *matHeaderCellDef> Nombre Transportista </th>
          <td mat-cell *matCellDef="let row"> {{row.transportista}} </td>
        </ng-container>

        <ng-container matColumnDef="peso">
          <th mat-header-cell *matHeaderCellDef> Peso </th>
          <td mat-cell *matCellDef="let row"> {{row.peso}} </td>
        </ng-container>

        <ng-container matColumnDef="medida">
          <th mat-header-cell *matHeaderCellDef> Tipo Medida </th>
          <td mat-cell *matCellDef="let row"> {{row.medida}} </td>
        </ng-container>

        <ng-container matColumnDef="fecha">
          <th mat-header-cell *matHeaderCellDef> Fecha Recepción </th>
          <td mat-cell *matCellDef="let row"> {{row.fecha}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
