<div class="page-container">
  <header class="section-header">
    <div class="title-group">
      <h1>Informacion de Pesajes</h1>
      <p>Listado de registros de pesajes.</p>
    </div>
    <div class="action-buttons">
      <button mat-button routerLink="/" class="back-btn">
        <mat-icon>arrow_back</mat-icon> Regresar
      </button>
      <button mat-raised-button class="add-btn" routerLink="/crearpesaje">
        <mat-icon>add</mat-icon> Crear Pesaje
      </button>
    </div>
  </header>

  <mat-card class="table-card">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="custom-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID Pesaje </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="cuenta">
          <th mat-header-cell *matHeaderCellDef> No. Cuenta </th>
          <td mat-cell *matCellDef="let element"> {{element.cuenta}} </td>
        </ng-container>

        <ng-container matColumnDef="peso">
          <th mat-header-cell *matHeaderCellDef> Peso Total </th>
          <td mat-cell *matCellDef="let element"> {{element.peso}} </td>
        </ng-container>

        <ng-container matColumnDef="parcialidades">
          <th mat-header-cell *matHeaderCellDef> Cant. Parcialidades </th>
          <td mat-cell *matCellDef="let element"> {{element.parcialidad}} </td>
        </ng-container>

        <ng-container matColumnDef="fecha">
          <th mat-header-cell *matHeaderCellDef> Fecha Envio </th>
          <td mat-cell *matCellDef="let element"> {{element.fecha}} </td>
        </ng-container>

        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge">{{element.estado}}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let element">
            <button mat-stroked-button color="primary" class="detail-btn" routerLink="/pesajes/verdetallepesaje">
              Ver Detalle
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
